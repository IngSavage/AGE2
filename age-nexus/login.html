<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión · Age Nexus</title>
  <link rel="stylesheet" href="src/css/base.css">
  <link rel="stylesheet" href="src/css/layout.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/themes.css">
</head>
<body class="theme-dark">
<main class="page-center">
  <div class="auth-card">
    <h1>Iniciar sesión</h1>

    <div id="login-success-notice" style="display: none; background-color: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #c3e6cb;">
        <strong>¡Bienvenido!</strong> Has iniciado sesión correctamente. Redirigiendo...
    </div>

    <form id="login-form" class="form">
      <label for="login-username">Correo electrónico</label>
      <input id="login-username" type="email" required>
      
      <label for="login-password">Contraseña</label>
      <input id="login-password" type="password" required>
      
      <button id="submit-btn" class="btn primary" type="submit">Iniciar sesión</button>
      
      <p class="muted">¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
      <p id="login-error" class="error"></p>
    </form>
    <p class="muted"><a href="index.html">Volver a la wiki</a></p>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="src/js/auth.js"></script>
  <script>
    const isValidEmail = (email) => {
      return /\S+@\S+\.\S+/.test(email);
    };

    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('login-form');
      const errorEl = document.getElementById('login-error');
      
      // 1. Nuevas referencias para el aviso y el botón
      const noticeEl = document.getElementById('login-success-notice');
      // Buscamos el botón dentro del formulario para deshabilitarlo durante la carga
      const submitBtn = form.querySelector('button[type="submit"]'); 

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.textContent = '';

        const email = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;

        if (!email || !isValidEmail(email)) {
          errorEl.textContent = 'Ingresa un correo válido.';
          return;
        }

        if (!password || password.length < 8) {
          errorEl.textContent = 'La contraseña debe tener al menos 8 caracteres.';
          return;
        }

        // 2. Deshabilitar el botón para prevenir múltiples envíos mientras carga
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.textContent = 'Iniciando sesión...';
        }

        try {
          // Llamada a Supabase mediante tu helper
          await window.Auth.signIn(email, password);
          
          // 3. Ocultar el formulario y mostrar el aviso de éxito
          form.style.display = 'none';
          if (noticeEl) noticeEl.style.display = 'block';

          // 4. Esperar 1.5 segundos antes de redirigir a la comunidad
          setTimeout(() => {
            window.location.href = 'index.html#comunidad';
          }, 1500);

        } catch (err) {
          errorEl.textContent = window.Auth.formatError(err);
          
          // 5. Restaurar el botón si ocurre un error
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Iniciar sesión';
          }
        }
      });
    });
  </script>
</body>
</html>
